<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: IA no RH — Qual é o seu nível?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --gold: #f0c060;
    --text: #eeeef4;
    --muted: #8888aa;
    --green: #4ade80;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(124,92,252,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.7s ease both;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(124,92,252,0.25), rgba(192,132,252,0.15));
    border: 1px solid rgba(124,92,252,0.4);
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 100px;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .question-card.answered::before { opacity: 1; }

  .question-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .question-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,92,252,0.08), rgba(192,132,252,0.04));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover { border-color: rgba(124,92,252,0.5); transform: translateX(3px); }
  .option:hover::before { opacity: 1; }

  .option.selected {
    border-color: var(--accent);
    background: rgba(124,92,252,0.12);
  }

  .option.selected::before { opacity: 1; }

  .option-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
    margin-top: 1px;
  }

  .option.selected .option-letter {
    background: var(--accent);
    color: #fff;
  }

  .option-text {
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.5;
    color: #cccce0;
    transition: color 0.2s;
    padding-top: 3px;
  }

  .option.selected .option-text { color: var(--text); }

  /* NAV BUTTONS */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 12px 28px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9d6fff);
    color: #fff;
    box-shadow: 0 4px 24px rgba(124,92,252,0.3);
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,92,252,0.45); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .result-screen.show { display: block; }

  .result-icon {
    font-size: 72px;
    margin-bottom: 24px;
    display: block;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .result-level {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 7vw, 56px);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 20%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    line-height: 1.1;
  }

  .result-desc {
    font-size: 17px;
    color: #aaaac0;
    max-width: 520px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .score-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 32px;
    text-align: left;
  }

  .score-breakdown h3 {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .score-row:last-child { margin-bottom: 0; }

  .score-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    width: 110px;
    flex-shrink: 0;
    color: var(--text);
  }

  .score-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0;
  }

  .bar-a { background: #60a5fa; }
  .bar-b { background: #4ade80; }
  .bar-c { background: var(--accent2); }
  .bar-d { background: var(--gold); }

  .score-count {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    width: 32px;
    text-align: right;
    color: var(--muted);
  }

  .btn-restart {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover { border-color: var(--accent); color: var(--accent2); }

  /* QUIZ WRAP */
  .quiz-wrap { display: block; }
  .quiz-wrap.hide { display: none; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Responsive */
  @media (max-width: 520px) {
    .question-card { padding: 24px 20px; }
    .container { padding: 40px 16px 60px; }
    .score-label { width: 80px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="badge">Diagnóstico de Maturidade</div>
    <h1>IA no RH:<br>Qual é o seu nível?</h1>
    <p class="subtitle">Responda 10 perguntas e descubra onde você está na jornada de uso de Inteligência Artificial no RH.</p>
  </div>

  <!-- QUIZ -->
  <div class="quiz-wrap" id="quizWrap">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressLabel">Pergunta 1 de 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="qNumber">Pergunta 01</div>
      <div class="question-text" id="qText"></div>
      <div class="options" id="optionsList"></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="btnBack" onclick="goBack()">← Voltar</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>Próxima →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-screen" id="resultScreen">
    <span class="result-icon" id="resultIcon"></span>
    <div class="result-level" id="resultLevel"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>

    <div class="score-breakdown">
      <h3>Distribuição das suas respostas</h3>
      <div class="score-row">
        <div class="score-label">Iniciante (A)</div>
        <div class="score-bar-wrap"><div class="score-bar-fill bar-a" id="barA"></div></div>
        <div class="score-count" id="countA">0</div>
      </div>
      <div class="score-row">
        <div class="score-label">Prático (B)</div>
        <div class="score-bar-wrap"><div class="score-bar-fill bar-b" id="barB"></div></div>
        <div class="score-count" id="countB">0</div>
      </div>
      <div class="score-row">
        <div class="score-label">Estrategista (C)</div>
        <div class="score-bar-wrap"><div class="score-bar-fill bar-c" id="barC"></div></div>
        <div class="score-count" id="countC">0</div>
      </div>
      <div class="score-row">
        <div class="score-label">Especialista (D)</div>
        <div class="score-bar-wrap"><div class="score-bar-fill bar-d" id="barD"></div></div>
        <div class="score-count" id="countD">0</div>
      </div>
    </div>

    <button class="btn-restart" onclick="restart()">↺ Refazer o Quiz</button>
  </div>

</div>

<script>
  const questions = [
    {
      text: "Sobre as ferramentas, quais você acessa regularmente para o seu trabalho?",
      options: [
        { letter: "A", text: "Nenhuma, ainda estou começando a entender como funcionam." },
        { letter: "B", text: "Apenas ferramentas de chat gratuitas (como ChatGPT, Claude ou Gemini)." },
        { letter: "C", text: "Ferramentas de chat pagas e, ocasionalmente, assistentes integrados em outras plataformas." },
        { letter: "D", text: "Ferramentas específicas de IA para RH ou automações conectadas a bancos de dados." }
      ]
    },
    {
      text: "Quando você precisa que a IA escreva um e-mail ou uma mensagem para um colaborador, como você faz?",
      options: [
        { letter: "A", text: "Digito um pedido bem simples, tipo: \"Escreva um e-mail de feedback\"." },
        { letter: "B", text: "Escrevo o contexto, mas a IA faz quase tudo sozinha." },
        { letter: "C", text: "Forneço o contexto, o tom de voz e o que NÃO pode faltar no texto." },
        { letter: "D", text: "Tenho modelos (templates) prontos que eu preencho e a IA apenas ajusta para aquele caso específico." }
      ]
    },
    {
      text: "Você já utilizou IA para analisar planilhas de dados (como turnover, clima ou folha)?",
      options: [
        { letter: "A", text: "Não, acho muito complexo e prefiro fazer manualmente no Excel." },
        { letter: "B", text: "Sim, mas apenas para pedir um resumo ou tirar dúvidas básicas sobre os números." },
        { letter: "C", text: "Sim, subo a planilha e peço para a IA encontrar padrões, tendências ou explicar o que aqueles números significam." },
        { letter: "D", text: "Sim, uso a IA para limpar meus dados e cruzar informações de fontes diferentes para gerar relatórios complexos." }
      ]
    },
    {
      text: "Como você lida com a criação de descrições de cargos ou materiais de treinamento?",
      options: [
        { letter: "A", text: "Peço para a IA criar do zero e uso praticamente como ela entregou." },
        { letter: "B", text: "Faço vários pedidos para a IA ajustar o texto até ficar do meu agrado." },
        { letter: "C", text: "Forneço documentos internos da empresa (como manuais ou políticas) para que a IA se baseie neles." },
        { letter: "D", text: "Tenho um assistente personalizado ou um \"projeto\" configurado com as diretrizes da empresa para que o padrão seja sempre mantido." }
      ]
    },
    {
      text: "Você já tentou conectar a sua IA a outras ferramentas (como Slack, Teams, Notion ou formulários)?",
      options: [
        { letter: "A", text: "Não sabia que era possível fazer isso." },
        { letter: "B", text: "Já tentei, mas achei complicado e desisti." },
        { letter: "C", text: "Sim, uso automações básicas (como copiar respostas da IA direto para um documento)." },
        { letter: "D", text: "Sim, utilizo fluxos automatizados onde a IA recebe os dados, processa e já dispara a tarefa em outra ferramenta." }
      ]
    },
    {
      text: "Como você garante a segurança das informações dos funcionários ao usar IA?",
      options: [
        { letter: "A", text: "Não me preocupo muito, confio na ferramenta." },
        { letter: "B", text: "Evito colocar nomes, mas coloco o cargo e o salário." },
        { letter: "C", text: "Sou muito cuidadoso: anonimizo todos os dados sensíveis (nome, CPF, IDs) antes de qualquer interação." },
        { letter: "D", text: "Utilizo apenas ambientes de IA privados ou corporativos que garantem que os dados não sejam usados para treinar o modelo." }
      ]
    },
    {
      text: "O que você faz quando a IA entrega uma resposta errada ou abaixo do esperado?",
      options: [
        { letter: "A", text: "Fico frustrado e tento perguntar outra coisa." },
        { letter: "B", text: "Tento mudar o jeito que escrevi a pergunta (o comando) para ver se melhora." },
        { letter: "C", text: "Analiso onde a IA errou e dou uma instrução mais específica para corrigir o rumo." },
        { letter: "D", text: "Analiso se o problema foi a minha instrução (contexto insuficiente) e reformulo toda a estrutura do pedido." }
      ]
    },
    {
      text: "Qual destas atividades você já automatizou usando IA?",
      options: [
        { letter: "A", text: "Nenhuma, faço tudo manualmente." },
        { letter: "B", text: "Apenas tarefas rápidas de tradução ou correção de texto." },
        { letter: "C", text: "Criação de roteiros de entrevista, planos de desenvolvimento individual ou resumos de reuniões." },
        { letter: "D", text: "Análise preditiva de retenção, filtragem de candidatos em massa ou criação de fluxos de trabalho completos." }
      ]
    },
    {
      text: "Com que frequência você busca aprender sobre novas funcionalidades das IAs que você usa?",
      options: [
        { letter: "A", text: "Raramente, uso do jeito que aprendi no início." },
        { letter: "B", text: "Quando alguém me mostra um recurso novo." },
        { letter: "C", text: "Tento explorar as novidades (como novos modelos ou funções) pelo menos uma vez por mês." },
        { letter: "D", text: "Acompanho lançamentos e testes de novas ferramentas semanalmente para ver o que pode otimizar meu RH." }
      ]
    },
    {
      text: "Como você se sente hoje ao usar IA no RH?",
      options: [
        { letter: "A", text: "Sinto que é algo que ainda distrai mais do que ajuda." },
        { letter: "B", text: "Sinto que é uma ferramenta útil, mas fico com medo de depender dela." },
        { letter: "C", text: "Sinto que sou bem mais produtivo em tarefas do dia a dia." },
        { letter: "D", text: "Sinto que a IA é um braço estratégico, permitindo que eu foque menos em operacional e mais em pessoas." }
      ]
    }
  ];

  const results = {
    A: {
      icon: "🌱",
      level: "Nível Iniciante",
      title: "O Curioso",
      desc: "Você deu o primeiro passo, mas ainda usa a ferramenta como um brinquedo. O foco agora é entender o potencial e perder o medo. Existe um mundo de possibilidades esperando por você!"
    },
    B: {
      icon: "⚡",
      level: "Intermediário I",
      title: "O Prático",
      desc: "Você já integra a IA na rotina para ganhar tempo em tarefas simples. O desafio é aprofundar no uso de dados e aprender a dar contexto mais rico nas suas instruções."
    },
    C: {
      icon: "🎯",
      level: "Intermediário II",
      title: "O Estrategista",
      desc: "Você já domina o contexto e a segurança. Sua produtividade é alta e você já entende que a qualidade da resposta depende do seu comando. Hora de expandir para automações!"
    },
    D: {
      icon: "🚀",
      level: "Nível Avançado",
      title: "O Especialista",
      desc: "Você usa a IA como um braço direito. Já entende de automação, segurança e está à frente da maioria dos profissionais de RH. Continue inovando e compartilhe o conhecimento!"
    }
  };

  let current = 0;
  let answers = new Array(questions.length).fill(null);

  function render() {
    const q = questions[current];
    document.getElementById('qNumber').textContent = `Pergunta ${String(current+1).padStart(2,'0')}`;
    document.getElementById('qText').textContent = q.text;

    const list = document.getElementById('optionsList');
    list.innerHTML = '';
    q.options.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option' + (answers[current] === i ? ' selected' : '');
      div.innerHTML = `<div class="option-letter">${opt.letter}</div><div class="option-text">${opt.text}</div>`;
      div.onclick = () => select(i);
      list.appendChild(div);
    });

    const answered = answers[current] !== null;
    document.getElementById('btnNext').disabled = !answered;
    document.getElementById('btnBack').style.visibility = current === 0 ? 'hidden' : 'visible';
    document.getElementById('btnNext').textContent = current === questions.length - 1 ? 'Ver resultado ✓' : 'Próxima →';

    const card = document.getElementById('questionCard');
    card.className = 'question-card' + (answered ? ' answered' : '');

    const pct = Math.round((current / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `Pergunta ${current+1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';

    // Animate card
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeUp 0.4s ease both';
  }

  function select(i) {
    answers[current] = i;
    document.querySelectorAll('.option').forEach((el, idx) => {
      el.className = 'option' + (idx === i ? ' selected' : '');
    });
    document.getElementById('btnNext').disabled = false;
    document.getElementById('questionCard').classList.add('answered');
  }

  function goNext() {
    if (answers[current] === null) return;
    if (current < questions.length - 1) {
      current++;
      render();
    } else {
      showResult();
    }
  }

  function goBack() {
    if (current > 0) { current--; render(); }
  }

  function showResult() {
    const counts = [0, 0, 0, 0];
    answers.forEach(a => { if (a !== null) counts[a]++; });

    const max = Math.max(...counts);
    let winner = counts.indexOf(max);
    const letters = ['A','B','C','D'];
    const r = results[letters[winner]];

    document.getElementById('resultIcon').textContent = r.icon;
    document.getElementById('resultLevel').textContent = r.level;
    document.getElementById('resultTitle').textContent = r.title;
    document.getElementById('resultDesc').textContent = r.desc;

    document.getElementById('countA').textContent = counts[0];
    document.getElementById('countB').textContent = counts[1];
    document.getElementById('countC').textContent = counts[2];
    document.getElementById('countD').textContent = counts[3];

    document.getElementById('quizWrap').classList.add('hide');
    document.getElementById('resultScreen').classList.add('show');

    setTimeout(() => {
      ['A','B','C','D'].forEach((l, i) => {
        document.getElementById('bar'+l).style.width = (counts[i] / 10 * 100) + '%';
      });
    }, 300);
  }

  function restart() {
    current = 0;
    answers = new Array(questions.length).fill(null);
    document.getElementById('resultScreen').classList.remove('show');
    document.getElementById('quizWrap').classList.remove('hide');
    ['A','B','C','D'].forEach(l => { document.getElementById('bar'+l).style.width = '0'; });
    render();
  }

  render();
</script>
</body>
</html>
